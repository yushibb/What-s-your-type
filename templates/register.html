<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 人物评分系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8Z"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                <h1>人物评分系统</h1>
            </div>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="2-20位，字母数字下划线" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="至少4位" required>
                </div>
                <div class="form-group">
                    <label for="confirm">确认密码</label>
                    <input type="password" id="confirm" name="confirm" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-auth">注 册</button>
            </form>

            <div class="auth-footer">
                已有账号？<a href="/login">去登录</a>
            </div>
        </div>
    </div>
</body>
</html>
